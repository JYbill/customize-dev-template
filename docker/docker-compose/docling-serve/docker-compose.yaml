services:
    docling-serve:
      image: ghcr.io/docling-project/docling-serve:latest
      ports:
        - "5001:5001"
      environment:
        - DOCLING_SERVE_CONFIG_FILE=/app/config.json
        # 可选：X-Api-Key请求头鉴权
        - DOCLING_SERVE_API_KEY=a1s2#f4g5
      volumes:
        - ./models:/app/models
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:5001/api"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 60s