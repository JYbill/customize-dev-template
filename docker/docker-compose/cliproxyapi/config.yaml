# 服务端口号
port: 8317

# 开启TLS协议，默认tls.enable=false
tls:
  enable: true
  cert: "/cert/cert.pem"
  key: "/cert/cert.key"

# 管理API设置
remote-management:
  # 默认false：仅允许localhost访问管理接口（仍需要密钥验证）
  # true：允许远程地址访问管理接口
  allow-remote: true
  # 访问管理接口的密钥。如果提供明文密钥，启动时会自动哈希加密并写回config.yaml文件。留空则完全禁用管理API（所有/v0/management 路由返回 404）
  secret-key: ""
  # 禁用控制面板资源下载，使用自定义管理面板适合为true
  disable-control-panel: false

# round-robin (default), fill-first(用完一下再切换下一个)
routing:
  strategy: "fill-first"

# 禁用高开销中间件以降低内存占用。
commercial-mode: false

# 存储认证令牌的目录（如果需要设置到其他地方，可以参考文档：https://help.router-for.me/configuration/storage/pgsql.html）
auth-dir: "~/.cli-proxy-api"

# 访问cliproxyapi代理所需要的API密钥列表
api-keys:
  - "your-api-key-1"

# true: 是否将日志写入转轮文件而不是输出到stdout
logging-to-file: true
# 默认0，日志转轮文件总数
logs-max-total-size-mb: 10

# 如果是 false：请求codex api供应商时代理基本不加这层官方 Codex 指令，原请求直接走
# 如果是 true：cli-proxy-api会在codex api请求上，按模型补进官方Codex的那套提示词指令进行伪造
codex-instructions-enabled: false

# 当为false时，禁用内存中使用统计聚合。默认true
usage-statistics-enabled: true

# 代理URL. 支持socks5/http/https协议. 比如: socks5://user:pass@192.168.1.1:1080/
proxy-url: ""

# http状态码为：403/408/500/502/503/504时，重试请求的次数。默认：3。当前凭证即会进入cool-down状态
request-retry: 3
# 默认：30.如果所有的凭证都进入了cool-down状态，客户端请求时会返回http 429状态，以及Retry-After: 30头，能够让客户端知道还需要等待多久
max-retry-interval: 30

# ws连接(/v1/ws)启用认证
ws-auth: true

# SSE行为
streaming:
  # 默认0禁用，当<=0禁用，用于ws、SSE的心跳包发送的间隔（包内容："\n\n"）
  keepalive-seconds: 15
  # 默认0，在没有任何数据发送下，发生错误时的重试次数，0表示不重试
  bootstrap-retries: 1


# 设置请求参数，下面参数实际测试下仅对相同api生效，即openai response api -> openai response api此时才会设置默认值。如果是协议转换则使用medium默认的深度思考级别
payload:
  default:
    - models:
        - name: gpt-5*
          protocol: ""
      params:
        reasoning.effort: high

# 对于responses api的prompt_cache_key的行为 👍
# claude api -> cli-proxy-api -> codex api/codex OAuth(responses api)，将model + metadata.user_id作为prompt_cache_key的唯一id

# 对于responses的previous_response_id参数行为
# response api -> cli-proxy-api -> codex api/codex OAuth/claude api...，将请求的previous_response_id参数直接删除，且不会记录每一轮的messages
# ws api -> cli-proxy-api -> codex api/codex OAuth/claude api...，将请求的previous_response_id参数直接删除，但会记录每一轮的messages在内存中，发送给上游提供商时会拼成messages完整的历史对话列表并发送

# 对于responses api -> claude api的cache_control参数行为
# response api -> cli-proxy-api -> claude api。tools 数组最后一个tool上加；system 最后一个 block上加；messages 倒数第二个 user block上加