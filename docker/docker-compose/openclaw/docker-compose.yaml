services:
  openclaw-gateway:
    image: alpine/openclaw:latest
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - ./.openclaw:/home/node/.openclaw
    ports:
      - "18789:18789"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]

  openclaw-cli:
    image: alpine/openclaw:latest
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
    volumes:
      - ./.openclaw:/home/node/.openclaw
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]