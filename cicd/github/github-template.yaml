# Action操作名称
name: CI

# github token权限，可以通过GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}读取该环境变量
permissions:
  # 允许读写仓库内容，包括代码、提交、tag、release
  contents: write
  # 允许workflow请求OIDC，方便进行npm发布
  id-token: write
  # 允许创建/编辑/关闭 PR，以及添加 PR 评论
  pull-requests: write
  # 允许创建/编辑/关闭 issue
  issues: write
  # 有权限给某个 commit / PR 写 GitHub 状态检查结果
  statuses: write

# 触发事件
on:
  push:
    branches: ["main"] # 针对main分支
  pull_request:
    branches: ["main"]
  # 在 GitHub 页面里手动点按钮触发、API 触发，触发路径：Actions → 选择这个 workflow → Run workflow
  workflow_dispatch:

# 并发控制：同一个 group 里的工作流不能并发跑多个
concurrency:
  # group名
  group: dockerhub-publish-${{ github.ref }}
  # 新任务来了会取消旧任务
  cancel-in-progress: true

  # 允许您从"Actions"选项卡手动运行此工作流
  workflow_dispatch:
    inputs:
      # (可选)允许输入触发的prompt
      prompt:
        description: "输入自定义触发的提示词"
        required: false

  # issue评论事件
  # created：创建时触发
  issue_comment:
    types: [created]

# 工作流
jobs:
  # 任务一
  build:
    # 矩阵配置，会使用22.x的node版本跑一次，配置多个元素就会跑多次
    strategy:
      matrix:
        node-version: [22.x]

    runs-on: ubuntu-latest # 运行作业的服务器系统

  # 任务二：设置前置任务条件
  build-push:
    name: parallel
    runs-on: ubuntu-latest
    needs:
      - lint-format
      - test

  agent:
    runs-on: ubuntu-latest

    # github.event_name：workflow_dispatch（手动触发）、issue_comment（评论触发）
    # github.event_name == 'workflow_dispatch' 手动触发workflow直接执行

    # github.event.comment.body：评论内容

    # github.event.comment.user.login: 评论者的用户名

    # github.event.comment.author_association：评论作者属性，OWNER创建者、MEMBER成员、COLLABORATOR合作者

    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body || '', '@sisyphus-dev-ai') &&
       (github.event.comment.user.login || '') != 'sisyphus-dev-ai' &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || ''))
    steps:
      - name: 配置agent git信息
        run: |
          git config user.name "opencode-ai"
          git config user.email "opencode-ai@users.noreply.github.com"
            # gh CLI auth as sisyphus-dev-ai
      - name: 为agent认证gh命令行
        run: |
          echo "${{ secrets.GH_PAT }}" | gh auth login --with-token
          gh auth status
      - name: 配置opencode
        run: |
          # 创建opencode配置、oh-my-openagent配置
          OPENCODE_JSON=~/.config/opencode/opencode.jsonc
          OMO_JSON=~/.config/opencode/oh-my-openagent.jsonc
